<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>notdistraught</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- HEADER -->
      <header class="header">
        <div class="header-inner">
          <div class="brand">
            <span class="brand-name">NOTDISTRAUGHT</span>
            <span class="brand-tag">MGMT SYSTEM</span>
          </div>
          <div class="header-right">
            <div class="live-dot" id="live-dot"></div>
          </div>
        </div>
        <!-- NAVIGASI: Tab Laporan sudah dihapus -->
        <nav class="tabs">
          <button class="tab active" data-tab="order" onclick="switchTab('order')">INPUT ORDER</button>
          <button class="tab" data-tab="stok" onclick="switchTab('stok')">STOK</button>
        </nav>
      </header>

      <!-- TOAST NOTIFICATION -->
      <div class="toast" id="toast"></div>

      <!-- MAIN CONTENT -->
      <main class="content">
        <!-- ====== TAB: ORDER ====== -->
        <section id="tab-order" class="tab-content active">
          <div class="section-title">PILIH PRODUK</div>
          <div id="product-list"></div>
        </section>

        <!-- ====== TAB: STOK ====== -->
        <section id="tab-stok" class="tab-content">
          <div class="section-title">STATUS STOK</div>
          <div id="stok-list"></div>

          <!-- RESTOCK MODAL (Input Tambah Stok) -->
          <div class="modal-overlay" id="restock-modal">
            <div class="modal-box">
              <div class="modal-title">RESTOCK PRODUK</div>
              <div class="modal-produk" id="restock-produk-name">—</div>
              <div class="modal-varian" id="restock-varian-name">—</div>
              <div class="modal-field">
                <label class="field-label">JUMLAH RESTOCK</label>
                <div class="qty-ctrl-big">
                  <button class="qty-btn-big" onclick="changeRestockQty(-1)">−</button>
                  <span class="qty-big" id="restock-qty">1</span>
                  <button class="qty-btn-big" onclick="changeRestockQty(1)">+</button>
                </div>
              </div>
              <div class="modal-actions">
                <button class="btn-cancel" onclick="closeRestock()">BATAL</button>
                <button class="btn-confirm" onclick="submitRestock()">KONFIRMASI</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <!-- BOTTOM BAR (Hanya muncul di Tab Order) -->
      <div class="bottom-bar" id="bottom-bar">
        <div class="bottom-summary">
          <span class="summary-label">TOTAL ITEM</span>
          <span class="summary-val" id="total-item-count">0 item</span>
        </div>
        <button class="btn-kirim" id="btn-kirim" onclick="kirimLaporan()">KIRIM ORDER</button>
      </div>
    </div>

    <!-- MODAL EDIT STOK (Struktur baru untuk UI yang lebih sleek) -->
    <div class="modal-overlay" id="edit-stok-modal">
      <div class="modal-box">
        <div class="modal-title" id="edit-produk-name">NAMA PRODUK</div>
        <div class="modal-sub" id="edit-varian-name">Varian Info</div>

        <div class="modal-field">
          <label class="field-label">JUMLAH STOK BARU</label>
          <input type="number" id="edit-qty-input" min="0" placeholder="0" />
        </div>

        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeEditStok()">BATAL</button>
          <button class="btn-confirm-edit" onclick="submitEditStok()">SIMPAN</button>
        </div>
      </div>
    </div>

    <script src="script.js?v=1.2"></script>
  </body>
</html>
